<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1120" />
    <meta
      name="description"
      content="Team dashboard for LinkedIn outreach campaigns run through Linked Helper 2."
    />
    <title>Outreach Deck</title>
    <!-- Resolve + paint the theme BEFORE the app bundle loads so there's no
         flash of the wrong theme: stored choice wins, else OS preference,
         else dark. Mirrored by src/lib/ThemeContext.tsx. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme')
          if (t !== 'light' && t !== 'dark') {
            t =
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
          }
          document.documentElement.setAttribute('data-theme', t)
          var m = document.querySelector('meta[name="theme-color"]')
          if (m) m.setAttribute('content', t === 'light' ? '#f4f6fb' : '#0b1120')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
